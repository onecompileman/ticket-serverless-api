  AWSTemplateFormatVersion: '2010-09-09'
  Transform: AWS::Serverless-2016-10-31
  Description: >
    ticket-serverless-api

    Sample SAM Template for ticket-serverless-api

  Metadata:
    cfn-lint:
      config:
        ignore_checks:
          - W3660

  Parameters:
    MyBucket:
      Type: String
      Default: ticket-storage-843232831760-ap-southeast-2-an
    ApiThrottleRateLimit:
      Type: Number
      Default: 50
    ApiThrottleBurstLimit:
      Type: Number
      Default: 100
    WafRateLimitPer5Min:
      Type: Number
      Default: 1000

  # More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
  Globals:
    Function:
      Timeout: 30
      MemorySize: 512

      # You can add LoggingConfig parameters such as the Logformat, Log Group, and SystemLogLevel or ApplicationLogLevel. Learn more here https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html#sam-function-loggingconfig.
      LoggingConfig:
        LogFormat: JSON
    Api:
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'*'"
        AllowMethods: "'*'"
      MethodSettings:
        - HttpMethod: "*"
          ResourcePath: "/*"
          ThrottlingRateLimit: !Ref ApiThrottleRateLimit
          ThrottlingBurstLimit: !Ref ApiThrottleBurstLimit
      BinaryMediaTypes:
        - multipart/form-data
  Resources:
    # BEGIN AUTO FUNCTIONS
    AuthGetActiveUserHandlerFunction:
      Type: AWS::Serverless::Function
      Properties:
        CodeUri: ./
        Handler: src/functions/auth/get-active-user-handler.lambdaHandler
        Runtime: nodejs20.x
        Environment:
          Variables:
            RDS_TYPE: "postgres"
            RDS_HOST: !Sub "{{resolve:ssm:Dev_RDS_Host}}"
            RDS_PORT: "5432"
            RDS_DB_NAME: "postgres"
            RDS_USERNAME: "postgres"
            RDS_PASSWORD: !Sub "{{resolve:ssm:Dev_RDS_Password}}"
            GMAIL_USER: !Sub "{{resolve:ssm:Dev_GMAIL_USER}}"
            GMAIL_PASS: !Sub "{{resolve:ssm:Dev_GMAIL_PASS}}"
            FRONTEND_URL: !Sub "{{resolve:ssm:Dev_FRONTEND_URL}}"
            COGNITO_JWKS_URL: !Sub "{{resolve:ssm:Dev_COGNITO_JWKS_URL}}"
            S3_BUCKET_NAME: !Sub "{{resolve:ssm:Dev_S3_BUCKET_NAME}}"
        Policies:
        - SSMParameterReadPolicy:
            ParameterName: "Dev_RDS_Password"
        - SSMParameterReadPolicy:
            ParameterName: "Dev_RDS_Host"
        - SSMParameterReadPolicy:
            ParameterName: "Dev_GMAIL_USER"
        - SSMParameterReadPolicy:
            ParameterName: "Dev_GMAIL_PASS"
        - SSMParameterReadPolicy:
            ParameterName: "Dev_FRONTEND_URL"
        - SSMParameterReadPolicy:
            ParameterName: "Dev_COGNITO_JWKS_URL"
        - SSMParameterReadPolicy:
            ParameterName: "Dev_S3_BUCKET_NAME"
        - Statement:
            - Sid: CognitoAdminGetUserAccess
              Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: arn:aws:cognito-idp:ap-southeast-2:843232831760:userpool/ap-southeast-2_ANIUcWB9u
        - S3CrudPolicy:
            BucketName: !Sub "{{resolve:ssm:Dev_S3_BUCKET_NAME}}"
        Architectures:
        - x86_64
        Events:
          AuthGetActiveUserHandler:
            Type: Api
            Properties:
              Path: /auth/get-active-user
              Method: get
          AuthGetActiveUserHandlerOptions:
            Type: Api
            Properties:
              Path: /auth/get-active-user
              Method: options
      Metadata:
        BuildMethod: esbuild
        BuildProperties:
          Minify: true
          Target: es2020
          Sourcemap: true
          Loader:
            - .html=file
          EntryPoints:
          - src/functions/auth/get-active-user-handler.ts

