<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Creation Failed</title>
</head>
<body style="margin:0;padding:0;background:#fff6f6;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" style="padding:24px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" style="max-width:640px;background:#ffffff;border:1px solid #f3c6c6;border-radius:12px;overflow:hidden;">
                    <tr>
                        <td style="padding:24px;background:#ffe5e5;border-bottom:1px solid #f3c6c6;">
                            <h1 style="margin:0;font-size:24px;line-height:32px;">Board Creation Failed</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px;">
                            <p style="margin:0 0 14px;line-height:24px;">Hi {{creatorName}},</p>
                            <p style="margin:0 0 14px;line-height:24px;">We could not create your board <strong>{{boardName}}</strong>.</p>
                            <p style="margin:0 0 10px;line-height:24px;">Error details:</p>
                            <p style="margin:0 0 18px;line-height:24px;color:#b91c1c;"><strong>{{errorMessage}}</strong></p>
                            <p style="margin:0;line-height:24px;">Please try again. If this continues, contact support with the error details above.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
