<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Created</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" style="padding:24px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" style="max-width:640px;background:#ffffff;border:1px solid #dbe3ef;border-radius:12px;overflow:hidden;">
                    <tr>
                        <td style="padding:24px;background:#e9f2ff;border-bottom:1px solid #dbe3ef;">
                            <h1 style="margin:0;font-size:24px;line-height:32px;">Board Created Successfully</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px;">
                            <p style="margin:0 0 14px;line-height:24px;">Hi {{creatorName}},</p>
                            <p style="margin:0 0 14px;line-height:24px;">Your board <strong>{{boardName}}</strong> is now ready.</p>
                            <p style="margin:0 0 20px;line-height:24px;">Board ID: <strong>{{boardId}}</strong></p>
                            <p style="margin:0 0 10px;line-height:24px;">Open your board:</p>
                            <p style="margin:0 0 18px;line-height:24px;"><a href="{{boardUrl}}">{{boardUrl}}</a></p>
                            <p style="margin:0;line-height:24px;">You can now add lists, tickets, and invite collaborators.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
